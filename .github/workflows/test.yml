name: Tests

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test Suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests (skip visual in CI)
        run: uv run pytest tests/ -v --tb=short --ignore=tests/visual/

      - name: Generate coverage report
        if: matrix.python-version == '3.11'
        run: uv run pytest tests/ --ignore=tests/visual/ --cov=src/odl_renderer --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Upload test snapshots on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-snapshots-py${{ matrix.python-version }}-${{ github.run_id }}
          path: tests/visual/__snapshots__/